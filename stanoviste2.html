<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏰 Hrad písmen - Stanovisko 2</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background: linear-gradient(135deg, #1e3a8a, #6d28d9, #0f172a);
  color:white;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  text-align:center;
  padding:20px;
}

h1{
  color:#fbbf24;
  margin-bottom:20px;
  font-size:26px;
}

/* BOX */
.box{
  background:rgba(0,0,0,0.4);
  padding:25px;
  border-radius:20px;
  max-width:400px;
  width:100%;
}

/* BUTTONS */
button{
  width:100%;
  padding:14px;
  margin:10px 0;
  border:none;
  border-radius:15px;
  font-size:16px;
  cursor:pointer;
  transition:0.2s;
}

.start{
  background:#10b981;
}

.start:hover{
  transform:scale(1.05);
}

.exit{
  background:#ef4444;
}

/* OVERLAY */
.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.9);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:2000;
}

.overlay-box{
  background:#064e3b;
  padding:30px;
  border-radius:20px;
  text-align:center;
}

/* RESPONSIVE */
@media(min-width:600px){
  h1{ font-size:30px; }
  button{ font-size:18px; }
}

@media(min-width:900px){
  .box{ max-width:500px; }
}
</style>
</head>

<body>

<h1>🏰 Hrad písmen</h1>

<div class="box">
  <p>Precvič si vybrané slová po B a otvor brány hradu!</p>

  <button class="start" onclick="startActivity()">🚀 Spustiť aktivitu</button>
  <button class="exit" onclick="returnToMap()">🏠 Späť na mapu</button>
</div>

<!-- EXIT OVERLAY -->
<div id="returnOverlay" class="overlay" style="display:none;">
  <div class="overlay-box">
    <h2>🏠 Vrátiť sa na mapu?</h2>
    <p>Chceš ukončiť Hrad písmen?</p>
    <button onclick="confirmReturn()">Áno</button>
    <button onclick="closeReturnOverlay()" style="background:#ef4444;">Zostať</button>
  </div>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbx0t_2q7ohFvF4ZvTDEGEklEP6kNf5tFkAL89rb9ug2A5CV_a7XVMoOTyKeGjBNqjTY/exec";
const stationId = 2;

// Funkcia zabezpečí meno a playerId z localStorage
function getPlayer(){
  let name = localStorage.getItem("playerName");
  let playerId = localStorage.getItem("playerId");

  if(!name || !playerId){
    console.warn("Meno alebo ID hráča chýba, použije sa prednastavené");
    name = "Hráč";
    playerId = crypto.randomUUID();
    localStorage.setItem("playerName", name);
    localStorage.setItem("playerId", playerId);
  }

  return { name, playerId };
}

/* START ACTIVITY */
function startActivity(){
  const { name, playerId } = getPlayer();

  // uloz visited
  let visited = JSON.parse(localStorage.getItem("visitedStations") || "[]");
  if(!Array.isArray(visited)) visited = [];
  if(!visited.includes(stationId)){
    visited.push(stationId);
    localStorage.setItem("visitedStations", JSON.stringify(visited));
  }

  // posli score = 1
  const payload = { name, playerId, station: stationId, score: 1 };
  const url = API + "?" + new URLSearchParams(payload).toString();

  fetch(url)
    .then(res => console.log("✅ Odoslané - Stanovisko 2"))
    .catch(err => console.error(err));

  // otvor Wordwall
  window.open("https://wordwall.net/resource/63266265/vybrané-slová-po-b", "_blank");
}

/* RETURN */
function returnToMap(){
  document.getElementById("returnOverlay").style.display = "flex";
}

function closeReturnOverlay(){
  document.getElementById("returnOverlay").style.display = "none";
}

function confirmReturn(){
  window.location.href = "index.html";
}
</script>

</body>
</html>
