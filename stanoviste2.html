<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏰 Hrad písmen - Stanovisko 2</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background: linear-gradient(135deg, #1e3a8a, #6d28d9, #0f172a);
  color:white;
  display:flex;
  flex-direction:column;
  align-items:center;
}

/* HEADER */
h1{
  margin:20px 10px;
  font-size:24px;
  text-align:center;
  color:#fbbf24;
}

/* IFRAME CONTAINER */
.game-container{
  width:95vw;
  max-width:900px;
  height:70vh;
  border-radius:20px;
  overflow:hidden;
  box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

iframe{
  width:100%;
  height:100%;
  border:none;
}

/* BUTTON */
button{
  margin:15px;
  padding:12px 25px;
  font-size:16px;
  border:none;
  border-radius:20px;
  background:#10b981;
  color:white;
  cursor:pointer;
}

/* OVERLAY */
.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.9);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:2000;
}

.overlay-box{
  background:#064e3b;
  padding:30px;
  border-radius:20px;
  text-align:center;
}

/* RESPONSIVE */
@media(min-width:600px){
  h1{ font-size:28px; }
}

@media(min-width:900px){
  .game-container{
    height:75vh;
  }
}
</style>
</head>

<body>

<h1>🏰 Hrad písmen</h1>

<div class="game-container">
  <iframe src="https://wordwall.net/resource/63266265/vybran%C3%A9-slov%C3%A1-po-b"></iframe>
</div>

<button onclick="returnToMap()">🏠 Späť na mapu</button>

<!-- EXIT OVERLAY -->
<div id="returnOverlay" class="overlay" style="display:none;">
  <div class="overlay-box">
    <h2>🏠 Vrátiť sa na mapu?</h2>
    <p>Chceš ukončiť Hrad písmen?</p>
    <button onclick="confirmReturn()">Áno</button>
    <button onclick="closeReturnOverlay()" style="background:#ef4444;">Zostať</button>
  </div>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbx0t_2q7ohFvF4ZvTDEGEklEP6kNf5tFkAL89rb9ug2A5CV_a7XVMoOTyKeGjBNqjTY/exec";
const stationId = 2;

/* SEND SCORE 1 ON LOAD */
window.addEventListener("load", () => {
  const name = localStorage.getItem("playerName");
  const playerId = localStorage.getItem("playerId");

  if(!name || !playerId) return;

  // uloz visited
  let visited = JSON.parse(localStorage.getItem("visitedStations") || "[]");
  if(!visited.includes(stationId)){
    visited.push(stationId);
    localStorage.setItem("visitedStations", JSON.stringify(visited));
  }

  const payload = {
    name,
    playerId,
    station: stationId,
    score: 1
  };

  const url = API + "?" + new URLSearchParams(payload).toString();

  fetch(url, {method:"GET", mode:"no-cors"})
    .then(()=>console.log("✅ score 1 odoslané"))
    .catch(()=>{});
});

/* RETURN */
function returnToMap(){
  document.getElementById("returnOverlay").style.display = "flex";
}

function closeReturnOverlay(){
  document.getElementById("returnOverlay").style.display = "none";
}

function confirmReturn(){
  window.location.href = "index.html";
}
</script>

</body>
</html>
