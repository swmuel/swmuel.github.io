<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🦉 Domček Sovy - Stanovisko 1</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background: linear-gradient(45deg, #1e3a8a, #3b82f6, #1e40af, #3730a3);
    background-size: 400% 400%;
    animation: gradientShift 15s ease infinite;
    color: white;
    text-align: center;
    padding: 40px;
    margin: 0;
  }
  @keyframes gradientShift {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }
  h1 { color: #fbbf24; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); font-size: 2.8em; }
  p { font-size: 1.3em; margin: 20px 0; }
  #gameArea { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 15px; max-width: 600px; margin: 30px auto; }
  .card { 
    width: 100px; height: 100px; 
    cursor: pointer; 
    border-radius: 15px; 
    transition: all 0.4s; 
    display: flex; align-items: center; justify-content: center;
    font-size: 3em; 
    border: 4px solid rgba(255,255,255,0.4);
    background: linear-gradient(145deg, rgba(30,58,138,0.8), rgba(59,130,246,0.6));
    color: transparent; 
    user-select: none;
    position: relative;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
  }
  .card::before { 
    content: "🦉";
    font-size: 2em;
    position: absolute;
    color: white;
    opacity: 0.7;
  }
  .card:hover { transform: scale(1.05) rotate(2deg); border-color: #fbbf24; }
  .card.flipped { 
    background: rgba(255,255,255,0.95) !important; 
    color: #1e3a8a !important; 
    border-color: #fbbf24 !important; 
    transform: rotateY(180deg);
  }
  .card.flipped::before { opacity: 0; }
  .card.matched { 
    background: rgba(251,191,36,0.6) !important; 
    border-color: #fbbf24 !important; 
    cursor: default; 
    transform: scale(0.95) !important;
  }
  .card.matched::before { opacity: 0; }
  .card.disabled { opacity: 0.6; cursor: not-allowed; transform: none !important; }
  #score { font-size: 1.5em; margin: 20px 0; font-weight: bold; color: #fbbf24; }
  #status { margin-top: 25px; font-size: 1.2em; min-height: 80px; line-height: 1.5; background: rgba(255,255,255,0.1); padding: 20px; border-radius: 15px; }

  button { font-size: 22px; padding: 14px 30px; margin: 12px; background: #10b981; border: none; border-radius: 20px; color: white; cursor: pointer; transition: all 0.3s; }
  button:hover { background: #34d399; transform: scale(1.08); }
  button:disabled { background: #666; cursor: not-allowed; transform: none; }

  @media (max-width: 500px) { 
    #gameArea { grid-template-columns: repeat(auto-fit, minmax(80px, 1fr)); gap: 12px; }
    .card { width: 80px; height: 80px; }
    .card::before { font-size: 1.6em; }
  }

  /* RETURN OVERLAY */
  .overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.9);
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:2000;
  }
  .overlay-box{
    background:#064e3b;
    padding:30px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 10px 40px rgba(0,0,0,0.6);
  }
  .overlay-box button{
    background:#10b981;
    border:none;
    padding:10px 20px;
    border-radius:10px;
    font-weight:bold;
    cursor:pointer;
    margin: 0 5px;
  }
</style>
</head>
<body>

<!-- RETURN OVERLAY -->
<div id="returnOverlay" class="overlay" style="display:none;">
  <div class="overlay-box">
    <h2>🏠 Vrátiť sa na mapu?</h2>
    <p>Chceš ukončiť Domček Sovy?</p>
    <button onclick="confirmReturn()">Áno</button>
    <button onclick="closeReturnOverlay()" style="background:#ef4444;">Zostať</button>
  </div>
</div>

<h1>🦉 Domček Sovy</h1>
<p>Nájdi všetky páry v sovom domčeku! 🦉🌙</p>
<div id="score">Páry nájdené: 0/8</div>
<div id="gameArea"></div>
<div id="status">🦉 Klikni na karty a nájdi rovnaké páry! (8 párov)</div>
<button onclick="returnToMap()">🏠 Späť na mapu</button>

<script>
"use strict";

const API = "https://script.google.com/macros/s/AKfycbx0t_2q7ohFvF4ZvTDEGEklEP6kNf5tFkAL89rb9ug2A5CV_a7XVMoOTyKeGjBNqjTY/exec";

// ✅ Funkcia na získanie mena a playerId
function ensurePlayer() {
  let name = localStorage.getItem("playerName");
  let playerId = localStorage.getItem("playerId");

  if (!name || !playerId) {
    name = "Hráč";
    playerId = crypto.randomUUID();
    localStorage.setItem("playerName", name);
    localStorage.setItem("playerId", playerId);
  }
  return { name, playerId };
}

const gameArea = document.getElementById('gameArea');
const statusEl = document.getElementById('status');
const scoreEl = document.getElementById('score');

const pairs = ['🦉','🌙','🌲','🐿️','🍄','⭐','👁️','🕸️','🦉','🌙','🌲','🐿️','🍄','⭐','👁️','🕸️'];

let flippedCards = [];
let score = 0;
let matchesFound = 0;
let gameActive = true;

/* SHUFFLE */
function shuffle(array) {
  return array.sort(() => Math.random() - 0.5);
}

/* START GAME */
function startGame(){
  score = 0;
  matchesFound = 0;
  gameActive = true;
  flippedCards = [];

  const shuffledPairs = shuffle(pairs.slice());

  gameArea.innerHTML = shuffledPairs.map((emoji, i) => 
    `<div class="card" onclick="flipCard(${i}, this)" data-emoji="${emoji}">🦉</div>`
  ).join('');

  scoreEl.textContent = `Páry nájdené: 0/8`;
  statusEl.innerHTML = "🦉 Klikni na karty a nájdi rovnaké páry!";
}

/* FLIP CARD */
function flipCard(index, card) {
  if (!gameActive || card.classList.contains('flipped') || card.classList.contains('matched') || flippedCards.length >= 2) return;
  
  card.classList.add('flipped');
  card.textContent = card.dataset.emoji;
  flippedCards.push({index, card, emoji: card.dataset.emoji});
  
  if (flippedCards.length === 2) {
    gameActive = false;
    score++;
    setTimeout(checkMatch, 800);
  }
}

/* CHECK MATCH */
function checkMatch() {
  if (flippedCards[0].emoji === flippedCards[1].emoji) {
    flippedCards.forEach(({card}) => card.classList.add('matched'));
    matchesFound++;
    if (matchesFound === 8) {
      statusEl.innerHTML = `🎉 Hotovo! 🦉 Skóre: ${score}`;
      finishStation(score);
      gameActive = false;
      return;
    }
  } else {
    flippedCards.forEach(({card})=>{
      card.classList.remove('flipped');
      card.textContent = '🦉';
    });
  }

  flippedCards = [];
  gameActive = true;
  scoreEl.textContent = `Páry nájdené: ${matchesFound}/8`;
}

/* RETURN TO MAP */
function returnToMap(){
  finishStation(score);
  window.location.href = "index.html";
}

function closeReturnOverlay(){
  document.getElementById("returnOverlay").style.display = "none";
}

function confirmReturn(){
  window.location.href = "index.html";
}

/* SEND SCORE */
function finishStation(finalScore){
  const stationId = 1;

  let visited = JSON.parse(localStorage.getItem("visitedStations") || "[]");
  if(!visited.includes(stationId)) visited.push(stationId);
  localStorage.setItem("visitedStations", JSON.stringify(visited));

  const { name, playerId } = ensurePlayer();

  const payload = {
    name,
    playerId,
    station: stationId,
    score: finalScore
  };

  const url = API + "?" + new URLSearchParams(payload).toString();
  fetch(url, {method:"GET", mode:"no-cors"})
    .catch(()=>{});
}

/* START */
startGame();
</script>
</body>
</html>
