<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🌲 Lesná telocvičňa - Stanovisko 6</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(to bottom, #2d5a2d, #4a7c59, #8fbc8f);
      color: white;
      text-align: center;
      padding: 40px;
      margin: 0;
    }
    h1 { 
      color: #f4a460; 
      text-shadow: 2px 2px 4px rgba(0,0,0,0.5); 
      font-size: 2.8em;
    }
    p { 
      font-size: 1.3em; 
      margin: 20px 0; 
      background: rgba(255,255,255,0.1);
      padding: 20px;
      border-radius: 15px;
    }
    .instructions {
      font-size: 1.4em;
      line-height: 1.6;
      max-width: 800px;
      margin: 30px auto;
      background: rgba(255,255,255,0.15);
      padding: 30px;
      border-radius: 20px;
      border-left: 5px solid #f4a460;
    }
    button {
      font-size: 22px;
      padding: 16px 40px;
      margin: 12px;
      background: #228b22;
      border: none;
      border-radius: 20px;
      color: white;
      cursor: pointer;
      transition: all 0.3s;
    }
    button:hover { 
      background: #32cd32; 
      transform: scale(1.08); 
    }
    button:disabled { 
      background: #666; 
      cursor: not-allowed; 
      transform: none; 
    }
    #status {
      margin-top: 30px;
      font-size: 1.2em;
      padding: 20px;
      border-radius: 12px;
      min-height: 100px;
      line-height: 1.5;
    }
    .success { background: #10b981; }
    .error   { background: #ef4444; }
    .loading { background: #3b82f6; }
  </style>
</head>
<body>
  <h1>🌲 Lesná telocvičňa</h1>
  <p>Poď sa prebehnúť lesnou prekážkovou dráhou!</p>

  <div class="instructions">
    <h2>📋 Inštrukcie prekážkovej dráhy:</h2>
    <p><strong>Vo vestibule si zahraj pohybovú hru!</p>
    
   
    
    
    
  </div>

  <br><br>
  <button id="finishBtn" onclick="finishStation()">✅ Dokončil som prekážkovú dráhu</button>

  <div id="status"></div>

  <script>
    "use strict";

    const API = "https://script.google.com/macros/s/AKfycbx0t_2q7ohFvF4ZvTDEGEklEP6kNf5tFkAL89rb9ug2A5CV_a7XVMoOTyKeGjBNqjTY/exec";

    function showStatus(msg, className = "") {
      const el = document.getElementById("status");
      if (el) {
        el.innerHTML = msg;
        el.className = className;
      }
    }

    function finishStation() {
      const stationId = 6;
      const statusEl = document.getElementById("status");
      const btn = document.getElementById("finishBtn");
      if (!statusEl || !btn) return;

      let visited = JSON.parse(localStorage.getItem("visitedStations") || "[]");
      if (!Array.isArray(visited)) visited = [];

      if (!visited.includes(stationId)) {
        visited.push(stationId);
        localStorage.setItem("visitedStations", JSON.stringify(visited));
      }

      let playerName = localStorage.getItem("playerName");
      if (!playerName) {
        playerName = prompt("Zadaj svoje meno:", "Hráč") || "Hráč";
        localStorage.setItem("playerName", playerName);
      }

      let playerId = localStorage.getItem("playerId");
      if (!playerId) {
        playerId = "hrac_" + Date.now();
        localStorage.setItem("playerId", playerId);
      }

      const payload = {
        name: playerName,
        playerId: playerId,
        station: stationId,
        score: visited.length
      };

      const url = API + "?" + new URLSearchParams(payload).toString();

      showStatus("🌲 Počítam lesné body...", "loading");
      btn.disabled = true;
      btn.textContent = "Odosiela sa...";

      fetch(url, { method: "GET", mode: "no-cors" })
        .then(() => {
          showStatus(
            `✅ LESNÁ TEL OCVIČNE DOKONČENÁ!<br><strong>${playerName}</strong><br>Stanovisko ${stationId} • Navštívené: ${visited.length}`,
            "success"
          );

          localStorage.setItem(`station_${stationId}`, "completed");

          setTimeout(() => {
            if (confirm("Vrátiť sa na mapu?")) {
              window.location.href = "index.html";
            }
            btn.disabled = false;
            btn.textContent = "✅ Dokončil som prekážkovú dráhu";
          }, 2200);
        })
        .catch(err => {
          console.error("Chyba:", err);
          showStatus(`❌ Chyba pri odosielaní<br>${err.message || "neznáma chyba"}<br>Skús znova (F12 pre viac info)`, "error");
          btn.disabled = false;
          btn.textContent = "✅ Dokončil som prekážkovú dráhu";
        });
    }
  </script>
</body>
</html>
