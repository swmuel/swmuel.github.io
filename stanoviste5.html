<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🧙 Čarodejnícka dielňa - Stanovisko 5</title>

<style>
body{
  font-family:Inter,system-ui;
  background:#064e3b;
  color:white;
  text-align:center;
  padding:40px 20px;
  display:flex;
  flex-direction:column;
  align-items:center;
  min-height:100vh;
}

h1{
  color:#fbbf24;
  text-shadow:2px 2px 4px rgba(0,0,0,0.5);
  font-size:2rem;
  margin-bottom:25px;
}

/* Buttons */
button{
  font-size:1.2rem;
  padding:15px 25px;
  margin:15px;
  background:#f59e0b;
  border:none;
  border-radius:15px;
  cursor:pointer;
  transition:all 0.2s;
}

button:hover{
  background:#fbbf24;
  transform:scale(1.05);
}

/* EXIT OVERLAY */
.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.9);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:2000;
}
.overlay-box{
  background:#064e3b;
  padding:30px;
  border-radius:20px;
  text-align:center;
  width:90%;
  max-width:350px;
}

.overlay-box button{
  margin:10px;
  width:120px;
}

.overlay-box button:first-of-type{
  background:#ef4444;
  color:white;
}

.overlay-box button:last-of-type{
  background:#fbbf24;
}
</style>
</head>

<body>

<h1>🧙 Čarodejnícka dielňa</h1>
<p>Pomôž čarodejníkovi vyriešiť aktivitu! Klikni na tlačidlo nižšie.</p>

<button id="startBtn">🧩 Otvoriť aktivitu</button>
<button onclick="showReturnOverlay()">🏠 Späť na mapu</button>

<!-- RETURN OVERLAY -->
<div id="returnOverlay" class="overlay" style="display:none;">
  <div class="overlay-box">
    <h2>🏠 Vrátiť sa na mapu?</h2>
    <p>Chceš ukončiť Čarodejnícku dielňu?</p>
    <button onclick="confirmReturn()">Áno</button>
    <button onclick="closeReturnOverlay()">Zostať</button>
  </div>
</div>

<script>
"use strict";

const API="https://script.google.com/macros/s/AKfycbx0t_2q7ohFvF4ZvTDEGEklEP6kNf5tFkAL89rb9ug2A5CV_a7XVMoOTyKeGjBNqjTY/exec";
const stationId = 5;

/* START BUTTON */
document.getElementById("startBtn").addEventListener("click", ()=>{
  let playerName = localStorage.getItem("playerName") || "Hráč";
  let playerId = localStorage.getItem("playerId") || "hrac_"+Date.now();

  // odoslanie skóre 1 hneď po otvorení
  const payload={name:playerName,playerId,station:stationId,score:1};
  const url=API+"?"+new URLSearchParams(payload).toString();
  fetch(url,{method:"GET",mode:"no-cors"});

  // otvorenie Wordwall
  window.open("https://wordwall.net/resource/81700395/scitanie-desiatky-jednotky","_blank");
});

/* RETURN OVERLAY */
function showReturnOverlay(){
  document.getElementById("returnOverlay").style.display="flex";
}
function closeReturnOverlay(){
  document.getElementById("returnOverlay").style.display="none";
}
function confirmReturn(){
  window.location.href="index.html";
}
</script>

</body>
</html>
