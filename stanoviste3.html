<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌸 Rozprávková lúka - Stanovisko 2</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background: linear-gradient(45deg, #10b981, #34d399, #6ee7b7, #dcfce7);
    background-size: 400% 400%;
    animation: gradientShift 15s ease infinite;
    color: #064e3b;
    text-align: center;
    padding: 40px;
    margin: 0;
  }
  @keyframes gradientShift {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }
  h1 { color: #7c2d12; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); font-size: 2.8em; }
  p { font-size: 1.3em; margin: 20px 0; }
  .task { font-size: 1.6em; margin: 25px 0; font-weight: bold; background: rgba(255,255,255,0.8); padding: 20px; border-radius: 20px; }
  .options { display: flex; justify-content: center; gap: 30px; margin: 30px 0; flex-wrap: wrap; }
  .option { 
    min-width: 140px; height: 120px; 
    cursor: pointer; 
    border-radius: 25px; 
    transition: all 0.3s; 
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    font-size: 2.6em; font-weight: bold;
    border: 5px solid rgba(124,45,18,0.4);
    background: rgba(255,255,255,0.9);
    user-select: none;
    box-shadow: 0 8px 25px rgba(0,0,0,0.2);
  }
  .option span {
    font-size: 0.5em;
    color: #4b5563;
    margin-top: 5px;
  }
  .option:hover { transform: scale(1.1); border-color: #7c2d12; background: rgba(255,255,255,1); }
  .option:active { transform: scale(0.98); }
  .option.correct { border-color: #10b981 !important; background: rgba(16,185,129,0.25); animation: bounce 0.5s; }
  .option.wrong { border-color: #ef4444 !important; background: rgba(239,68,68,0.25); animation: shake 0.5s; }
  .option.disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; }

  @keyframes bounce { 0%,20%,50%,80%,100%{transform:translateY(0);}40%{transform:translateY(-15px);}60%{transform:translateY(-8px);} }
  @keyframes shake { 0%,100%{transform:translateX(0);}10%,30%,50%,70%,90%{transform:translateX(-5px);}20%,40%,60%,80%{transform:translateX(5px);} }

  #status { margin-top: 25px; font-size: 1.2em; min-height: 100px; line-height: 1.5; background: rgba(255,255,255,0.8); padding: 20px; border-radius: 15px; }

  button { font-size: 22px; padding: 14px 30px; margin: 12px; background: #7c2d12; border: none; border-radius: 20px; color: white; cursor: pointer; transition: all 0.3s; }
  button:hover { background: #9a3412; transform: scale(1.08); }
  button:disabled { background: #666; cursor: not-allowed; transform: none; }

  @media (max-width: 500px) {
    .options { gap: 15px; }
    .option { min-width: 110px; height: 100px; font-size: 2.2em; }
  }

  /* NAME OVERLAY */
  #nameOverlay {
    position: fixed;
    inset:0;
    background: rgba(0,0,0,0.85);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 1000;
    color: white;
    font-size: 1.3em;
  }
  #nameOverlay input {
    font-size: 1.2em;
    padding: 10px 15px;
    border-radius: 10px;
    border: none;
    margin-top: 15px;
    text-align: center;
  }
  #nameOverlay button {
    margin-top: 15px;
    font-size: 1.2em;
    padding: 10px 20px;
    border-radius: 10px;
  }

  /* RETURN OVERLAY */
  .overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.9);
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:2000;
  }
  .overlay-box{
    background:#064e3b;
    padding:30px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 10px 40px rgba(0,0,0,0.6);
  }
  .overlay-box button{
    background:#10b981;
    border:none;
    padding:10px 20px;
    border-radius:10px;
    font-weight:bold;
    cursor:pointer;
    margin: 0 5px;
  }
</style>
</head>
<body>

<!-- NAME OVERLAY -->
<div id="nameOverlay">
  <div>Prosím, zadaj svoje meno:</div>
  <input type="text" id="playerNameInput" placeholder="Tvoje meno">
  <button onclick="submitName()">Potvrdiť</button>
</div>

<!-- RETURN OVERLAY -->
<div id="returnOverlay" class="overlay" style="display:none;">
  <div class="overlay-box">
    <h2>🏠 Vrátiť sa na mapu?</h2>
    <p>Chceš ukončiť Rozprávkovú lúku?</p>
    <button onclick="confirmReturn()">Áno</button>
    <button onclick="closeReturnOverlay()" style="background:#ef4444;">Zostať</button>
  </div>
</div>

<h1>🌸 Rozprávková lúka</h1>
<p>Vypočítaj, koľko je spolu rozprávkových postavičiek. Výsledok doplň za otáznik. 🌸</p>

<div id="gameArea"></div>
<div id="status"></div>
<button onclick="returnToMap()">🏠 Späť na mapu</button>

<script>
"use strict";

const API = "https://script.google.com/macros/s/AKfycbx0t_2q7ohFvF4ZvTDEGEklEP6kNf5tFkAL89rb9ug2A5CV_a7XVMoOTyKeGjBNqjTY/exec";
const gameArea = document.getElementById('gameArea');
const statusEl = document.getElementById('status');
const overlay = document.getElementById('nameOverlay');
const input = document.getElementById('playerNameInput');

// VŠETKY ÚLOHY: vždy otáznik, nikdy nie je výsledok v texte
const tasks = [
  {question: "Na lúke sú 🐷🐷🐷 a 🐺🐺. Koľko je to spolu zvieratiek? = ?", options: ["3", "4", "5"], correct: 2},
  {question: "Snehulienka má 7️⃣ trpaslíkov. Pridali sa k nim 3️⃣ kamaráti. Koľko ich je spolu? = ?", options: ["9", "10", "8"], correct: 1},
  {question: "Na lúke skáču 🐰🐰🐰. Jeden ušiel do lesa. Koľko zajačikov zostalo? = ?", options: ["1", "2", "3"], correct: 1},
  {question: "V domčeku bývajú 3️⃣ medvede a 1️⃣ Zlatovláska. Koľko postavičiek je v domčeku? = ?", options: ["3", "4", "5"], correct: 1},
  {question: "Na piknik prišli 👸👸 a 🤴🤴🤴. Koľko detí je spolu na lúke? = ?", options: ["4", "5", "6"], correct: 1},
  {question: "Na lúke sú 🧚‍♀️🧚‍♀️🧚‍♀️ a priletí ešte jedna 🧚‍♀️. Koľko víl je spolu? = ?", options: ["3", "4", "5"], correct: 1},
  {question: "Vlk zjedol 1️⃣ z 3️⃣ prasiatok. Koľko prasiatok ešte zostalo? = ?", options: ["1", "2", "3"], correct: 1},
  {question: "Na strome sedí 5️⃣ vtáčikov. 2️⃣ odletia. Koľko vtáčikov zostane? = ?", options: ["2", "3", "4"], correct: 1},
  {question: "Na lúku prišli 4️⃣ princezné a 2️⃣ rytieri. Koľko je ich spolu? = ?", options: ["5", "6", "7"], correct: 1},
  {question: "V košíku sú 🍎🍎🍎🍎 a Snežienka pridá ešte jedno. Koľko jabĺk je spolu? = ?", options: ["4", "5", "6"], correct: 1},
  {question: "Na lúke sú 2️⃣ vlci a 6️⃣ ovečiek. Koľko zvierat je spolu? = ?", options: ["6", "7", "8"], correct: 2},
  {question: "V jazierku plávajú 🐸🐸🐸🐸. 1️⃣ vyskočí na breh. Koľko žiab ostalo vo vode? = ?", options: ["3", "2", "4"], correct: 0}
];

let order = [];
let currentIndex = 0;
let score = 0;

function shuffle(array) {
  return array.sort(() => Math.random() - 0.5);
}

function startGame(){
  overlay.style.display = 'none';
  score = 0;
  order = shuffle(Array.from(tasks.keys()));
  currentIndex = 0;
  showTask();
  statusEl.innerHTML = "🌸 Vypočítaj príklad a klikni na správne číslo. 🧮";
}

function submitName(){
  const name = input.value.trim();
  if(!name) return alert("Zadaj platné meno!");
  const playerId = crypto.randomUUID();
  localStorage.setItem("playerName", name);
  localStorage.setItem("playerId", playerId);
  startGame();
}

function showTask() {
  if(currentIndex >= order.length){
    statusEl.innerHTML = `🎉 Rozprávková lúka dokončená! 🌸<br>Správne odpovede: ${score}/${tasks.length}`;
    gameArea.innerHTML = "";
    finishStation(score);
    return;
  }
  const task = tasks[order[currentIndex]];
  gameArea.innerHTML = `
    <div class="task">${task.question}</div>
    <div class="options">
      ${task.options.map((opt, i) => 
        `<div class="option" onclick="checkAnswer(${i})">${opt}<span>⭐</span></div>`
      ).join('')}
    </div>
  `;
}

function checkAnswer(selected){
  const task = tasks[order[currentIndex]];
  const options = document.querySelectorAll('.option');
  options.forEach(el => el.classList.add('disabled'));
  
  const correctOption = options[task.correct];
  const selectedOption = options[selected];
  
  if(selected === task.correct){
    score++;
    selectedOption.classList.add('correct');
    statusEl.innerHTML = `✅ Super! (${score}/${tasks.length}) 🌸`;
    setTimeout(() => {
      currentIndex++;
      showTask();
    }, 1500);
  } else {
    selectedOption.classList.add('wrong');
    correctOption.classList.add('correct');
    statusEl.innerHTML = "❌ Nesprávne, pozri sa ešte raz na príbeh. 💡";
    setTimeout(() => {
      options.forEach(el => el.classList.remove('correct','wrong','disabled'));
    }, 1500);
  }
}

/* EXIT MODAL LOGIC */
function returnToMap(){
  document.getElementById("returnOverlay").style.display = "flex";
}
function closeReturnOverlay(){
  document.getElementById("returnOverlay").style.display = "none";
}
function confirmReturn(){
  finishStation(score);
  window.location.href = "index.html";
}

function finishStation(finalScore){
  const stationId = 2;
  let visited = JSON.parse(localStorage.getItem("visitedStations") || "[]");
  if(!Array.isArray(visited)) visited=[];
  if(!visited.includes(stationId)) visited.push(stationId);
  localStorage.setItem("visitedStations", JSON.stringify(visited));

  const playerName = localStorage.getItem("playerName");
  const playerId = localStorage.getItem("playerId");
  if(!playerName || !playerId){
    console.error("Meno alebo ID hráča chýba!");
    return;
  }

  const payload = {name: playerName, playerId, station: stationId, score: finalScore || score};
  const url = API + "?" + new URLSearchParams(payload).toString();

  statusEl.innerHTML += "<br>📤 Odosielam dáta...";
  fetch(url,{method:"GET",mode:"no-cors"})
    .then(()=>console.log("✅ Odoslané - Stanovisko 2"))
    .catch(err=>console.error(err));
}

if(localStorage.getItem("playerName")){
  overlay.style.display='none';
  startGame();
}
</script>
</body>
</html>
