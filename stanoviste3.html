<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌸 Rozprávková lúka - Stanovisko 3</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background: linear-gradient(45deg, #10b981, #34d399, #6ee7b7, #dcfce7);
    background-size: 400% 400%;
    animation: gradientShift 15s ease infinite;
    color: #064e3b;
    text-align: center;
    padding: 40px;
    margin: 0;
  }
  @keyframes gradientShift {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }
  h1 { color: #7c2d12; font-size: 2.8em; }
  p { font-size: 1.3em; margin: 20px 0; }

  button {
    font-size: 22px;
    padding: 14px 30px;
    margin: 12px;
    background: #7c2d12;
    border: none;
    border-radius: 20px;
    color: white;
    cursor: pointer;
    transition: all 0.3s;
  }
  button:hover { background: #9a3412; transform: scale(1.08); }

  /* OVERLAYS */
  #nameOverlay, .overlay {
    position: fixed;
    inset:0;
    background: rgba(0,0,0,0.85);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 1000;
    color: white;
  }

  #nameOverlay input {
    font-size: 1.2em;
    padding: 10px;
    border-radius: 10px;
    border: none;
    margin-top: 15px;
    text-align: center;
  }

  .overlay-box{
    background:#064e3b;
    padding:30px;
    border-radius:20px;
    text-align:center;
    color:white;
  }
</style>
</head>
<body>

<!-- NAME OVERLAY -->
<div id="nameOverlay">
  <div>Prosím, zadaj svoje meno:</div>
  <input type="text" id="playerNameInput" placeholder="Tvoje meno">
  <button onclick="submitName()">Potvrdiť</button>
</div>

<!-- RETURN OVERLAY -->
<div id="returnOverlay" class="overlay" style="display:none;">
  <div class="overlay-box">
    <h2>🏠 Vrátiť sa na mapu?</h2>
    <p>Chceš ukončiť Rozprávkovú lúku?</p>
    <button onclick="confirmReturn()">Áno</button>
    <button onclick="closeReturnOverlay()" style="background:#ef4444;">Zostať</button>
  </div>
</div>

<h1>🌸 Rozprávková lúka</h1>
<p>Klikni na tlačidlo a otvor úlohu 🌸</p>

<button onclick="openGame()">🎮 Spustiť úlohu</button>
<button onclick="returnToMap()">🏠 Späť na mapu</button>

<script>
"use strict";

const overlay = document.getElementById('nameOverlay');
const input = document.getElementById('playerNameInput');
const stationId = 3;
const API = "https://script.google.com/macros/s/AKfycbx0t_2q7ohFvF4ZvTDEGEklEP6kNf5tFkAL89rb9ug2A5CV_a7XVMoOTyKeGjBNqjTY/exec";

// Funkcia na získanie mena a ID hráča
function getPlayer(){
  let name = localStorage.getItem("playerName");
  let playerId = localStorage.getItem("playerId");

  if(!name || !playerId){
    console.warn("Meno alebo ID hráča chýba, použije sa prednastavené");
    name = "Hráč";
    playerId = crypto.randomUUID();
    localStorage.setItem("playerName", name);
    localStorage.setItem("playerId", playerId);
  }

  return { name, playerId };
}

// Zápis mena
function submitName(){
  const name = input.value.trim();
  if(!name) return alert("Zadaj meno!");

  let playerId = localStorage.getItem("playerId");
  if(!playerId) playerId = crypto.randomUUID();

  localStorage.setItem("playerName", name);
  localStorage.setItem("playerId", playerId);
  overlay.style.display = "none";
}

// Otvorenie Wordwall + odoslanie score
function openGame(){
  const { name, playerId } = getPlayer();

  // Uložiť visited
  let visited = JSON.parse(localStorage.getItem("visitedStations") || "[]");
  if(!Array.isArray(visited)) visited = [];
  if(!visited.includes(stationId)){
    visited.push(stationId);
    localStorage.setItem("visitedStations", JSON.stringify(visited));
  }

  // Poslať score
  const payload = { name, playerId, station: stationId, score: 1 };
  const url = API + "?" + new URLSearchParams(payload).toString();

  fetch(url, { method: "GET", mode: "no-cors" })
    .then(() => console.log("✅ Odoslané - Stanovisko 3"))
    .catch(err => console.error(err));

  // Otvoriť Wordwall
  window.open("https://wordwall.net/resource/55019181/su%C4%8Det-do-100-%C4%8Dislo-4", "_blank");
}

// EXIT MODAL
function returnToMap(){ document.getElementById("returnOverlay").style.display = "flex"; }
function closeReturnOverlay(){ document.getElementById("returnOverlay").style.display = "none"; }
function confirmReturn(){ window.location.href = "index.html"; }

// AUTO SKIP NAME
if(localStorage.getItem("playerName")) overlay.style.display = "none";
</script>

</body>
</html>
